<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <div class="hero-image flex-grow-1 text-white">
    <div class="container p-4 mt-5 mb-5 rounded bg-dark">

        <h1>Cine Sophia</h1>
        <hr>
        <h4>Student Details</h4>

        <form>
          <div class="row">

            <!-- Full Name -->
            <div class="col-6">
              <label class="form-label">Full Name</label>
                <input type="text" class="form-control mb-3" placeholder="Enter your full name">
            </div>

            <!-- Ticket -->
            <div class="col-6">
              <label class="form-label">Ticket</label>
                <input type="number" id="get_your_ticket" class="form-control mb-3" placeholder="Enter Quantity" value="0" min="0">
              <br>
            </div>

          </div>

            <h4>Payment Details</h4>
            <hr>

            <div class="row">

              <!-- Subtotal -->
                <p>Subtotal <span id="subtotal" class="badge bg-white">₱0.00</span></p>

              <!-- Admin Fee -->
                <p>Admin Fee <span id="admin fee" class="badge bg-white">₱0.00</span></p>

              <!-- Total -->
                <p>Total <span id="totalprice" class="badge bg-white">₱0.00</span></p>

            <hr>

            <!-- Buttons -->
            <div class="col-12">
              <button type="button" class="btn btn-danger mt-3" onclick="window.location.reload()">Reload</button>
            </div>

            <div class="col-12">
              <button type="button" onclick="getTotal()" class="btn btn-primary mt-3">Complete Registration</button>
              <div id="result_Ticket"></div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>

  </body>
</html>
