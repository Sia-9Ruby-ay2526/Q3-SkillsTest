<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q3 Skills Test</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="hero-image flex-grow-1 text-white">
<div class="container p-4 mt-5 mb-5 rounded bg-dark" style="opacity:0.67;">

<h1>Cine Sophia</h1>
<hr>
<h4>Student Details</h4>

<form>
<div class="row">

<!-- Full Name -->
<div class="col-6">
<label class="form-label">Full Name</label>
<input type="text" class="form-control mb-3" placeholder="Enter your full name">
</div>

<!-- Ticket -->
<div class="col-6">
<label class="form-label">Ticket</label>
<input type="number" class="form-control mb-3" placeholder="Enter Quantity" value="0" min="0">
<br>
</div>

<h4>Payment</h4>
<!-- Subtotal -->
<div class="col-6 col-lg-4">
<label class="span">Subtotal</label>
<input class="form-control mb-3" value="0">
</div>

<!-- Admin Fee -->
<div class="col-6 col-lg-4">
<label class="span">Admin Fee (50 minimum)</label>
<input class="form-control mb-3" value="50" min="50">
</div>

<!-- Total -->
<div class="col-6 col-lg-4">
<label class="">Total</label>
<input type="number" class="form-control mb-3" value="0">
</div>

<!-- Checkbox -->
<div class="col-12">
<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="remember">
<label class="form-check-label" for="remember">Remember me</label>
</div>
</div>

<!-- Button -->
<div class="col-12">

</div>

</div>
</form>

</div>
</div>

</body>
</html>
